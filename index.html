<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ライフサポーターオンライン</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.6; background-color: #f9f9f9; }
        
        .wrap { 
            max-width: 550px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 20px; 
            box-sizing: border-box;
            min-height: 100vh;
        }

        .banner-container {
            width: 100%;
            margin-bottom: 20px;
        }
        .banner-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content-area { text-align: center; padding: 20px 0; }
        h2 { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        p { font-size: 18px; margin-bottom: 20px; }

        .qrcode { margin: 20px auto; }
        .addfriend_btn { width: 100%; max-width: 300px; display: inline-block; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="banner-container">
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="ライフサポーターオンライン">
    </div>
    
    <div class="content-area">
        <h2>ライフサポーター<br>オンライン</h2>
        <p>ライフサポーターオンライン会員サイトで利用できるツールやゲームなど約100個の中から厳選した5選です。</p>
        <p>以下より申し込みしてください</p>
<p><a href="https://life-supporter.jp/p/r/HP0WeFt4">オンライン便利ツール5選プレゼント</a></p>
        
        <p>メールにて、すぐご利用できる url をお知らせします。</p>
    </div>
    <img src="https://life-supporter.jp/sp/hxySQ4ff/8BaRR2j8/images/XS012098.jpg" style="display:block; margin:20px auto; max-width:100%;">
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://autosns.jp/js/zbp/jquery.qrcode.min.js"></script>
<script src="https://g0qiltvg.autosns.app/copy-qr/js?height=200&show=1"></script>

<script>
    window.addEventListener("load", function() {
        let url = new URL(window.location.href);
        let get_params = {};
        for(entry of url.searchParams) { get_params[entry[0]] = entry[1]; }
        get_params['partner_id'] = "A8ildpNc2q";
        for(key in get_params) { 
            let span = document.createElement('span');
            span.className = 'proline-copy-qr-get-params';
            span.setAttribute('data-key', key);
            span.setAttribute('data-value', get_params[key]);
            document.body.appendChild(span);
        }
    });
</script>

</body>
</html>
